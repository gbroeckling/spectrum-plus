# Copy this file to 'secrets.yaml' in the same folder as your ESPHome YAML,
# then fill in YOUR values. Never commit secrets.yaml to GitHub.

wifi_ssid: "YOUR_WIFI_SSID"
wifi_password: "YOUR_WIFI_PASSWORD"

# ESPHome API encryption key (generate in ESPHome when you adopt the device)
api_encryption_key: "YOUR_API_ENCRYPTION_KEY"

# OTA password (set your own)
ota_password: "YOUR_OTA_PASSWORD"

# Fallback AP password (device hotspot when it can't join Wi-Fi)
ap_password: "YOUR_FALLBACK_AP_PASSWORD"

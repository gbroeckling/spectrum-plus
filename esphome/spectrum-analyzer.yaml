esphome:
  name: spectrum-analyzer
  friendly_name: Spectrum Analyzer
  includes:
    - spectrum_includes.h
  platformio_options:
    lib_deps:
      - kosme/arduinoFFT@^1.6.2
    build_flags:
      - -O3
  on_boot:
    priority: 600
    then:
      - lambda: |-
          for (size_t i = 0; i < 64; i++) {
            id(bars)[i] = 0;
            id(peaks)[i] = 0;
          }
          id(ref_level) = 0.10f;
          id(boot_anim) = true;
          id(boot_until_ms) = millis() + 6000;  // full-screen startup test
          spectrum::i2s_init_mic(GPIO_NUM_41, GPIO_NUM_42, GPIO_NUM_40);

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s
  on_client_connected:
    then:
      - lambda: |-
          id(boot_anim) = false;
  on_client_disconnected:
    then:
      - lambda: |-
          id(boot_anim) = true;
          id(boot_until_ms) = millis() + 6000;

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Spectrum-Analyzer"
    password: !secret ap_password

captive_portal:

psram:
  mode: octal
  speed: 80MHz

globals:
  - id: bars
    type: std::array<uint8_t, 64>
    restore_value: no
    initial_value: "{0}"

  - id: peaks
    type: std::array<uint8_t, 64>
    restore_value: no
    initial_value: "{0}"

  - id: ref_level
    type: float
    restore_value: no
    initial_value: "0.10"

  - id: boot_anim
    type: bool
    restore_value: no
    initial_value: "true"

  - id: boot_until_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

interval:
  - interval: 40ms
    then:
      - lambda: |-
          if (id(boot_anim)) {
            if ((int32_t) (id(boot_until_ms) - millis()) > 0) {
              spectrum::boot_animation_update(id(bars), id(peaks));
              return;
            } else {
              id(boot_anim) = false;
            }
          }
          spectrum::fft_update(id(bars), id(peaks), id(ref_level));

display:
  - platform: hub75
    id: matrix
    panel_width: 128
    panel_height: 64
    shift_driver: FM6126A

    r1_pin: GPIO4
    g1_pin: GPIO5
    b1_pin: GPIO6
    r2_pin: GPIO7
    g2_pin: GPIO8
    b2_pin: GPIO9

    a_pin: GPIO10
    b_pin: GPIO11
    c_pin: GPIO12
    d_pin: GPIO13
    e_pin: GPIO14

    clk_pin: GPIO15
    lat_pin: GPIO16
    oe_pin: GPIO17

    brightness: 96
    bit_depth: 5
    gamma_correct: CIE1931
    update_interval: 16ms

    lambda: |-
      const int w = it.get_width();   // 128
      const int h = it.get_height();  // 64
      it.clear();

      const int n_bars = 64;
      const int bar_w = std::max(1, w / n_bars); // 2 on 128 width
      const int draw_w = id(boot_anim) ? bar_w : std::max(1, bar_w - 1); // spaced bars (every second pixel)

      auto lerp_u8 = [](uint8_t a, uint8_t b, float u) -> uint8_t {
        if (u < 0.0f) u = 0.0f;
        if (u > 1.0f) u = 1.0f;
        return (uint8_t) (a + (b - a) * u + 0.5f);
      };

      // Base gradient (low->high): Red -> Orange -> Yellow -> Green -> Cyan -> Blue  (no purple)
      auto base_color_for_bar = [&](int i) -> Color {
        const float t = (n_bars <= 1) ? 0.0f : ((float) i / (float) (n_bars - 1)); // 0..1
        const float p = t * 5.0f;
        int seg = (int) p;
        float u = p - (float) seg;
        if (seg < 0) { seg = 0; u = 0.0f; }
        if (seg > 4) { seg = 4; u = 1.0f; }

        const uint8_t R[6] = {255, 255, 255,   0,   0,   0};
        const uint8_t G[6] = {  0, 128, 255, 255, 255,   0};
        const uint8_t B[6] = {  0,   0,   0,   0, 255, 255};

        uint8_t r = lerp_u8(R[seg], R[seg+1], u);
        uint8_t g = lerp_u8(G[seg], G[seg+1], u);
        uint8_t b = lerp_u8(B[seg], B[seg+1], u);
        return Color(r, g, b);
      };

      for (int i = 0; i < n_bars; i++) {
        int bh = (int) id(bars)[i];
        int pk = (int) id(peaks)[i];

        if (bh < 0) bh = 0;
        if (bh > h) bh = h;
        if (pk < 0) pk = 0;
        if (pk > h) pk = h;

        const int x = i * bar_w;
        if (x >= w) break;

        int ww = draw_w;
        if (x + ww > w) ww = w - x;
        if (ww <= 0) continue;

        Color base = base_color_for_bar(i);

        if (bh > 0) {
          // Much stronger bottom fade WITHOUT reducing max height:
          // - tall bars get a bigger fade zone at the bottom
          // - very dim rows are skipped entirely (fewer LEDs on)
          const float strength = (float) bh / (float) h; // 0..1
          const int fade_max = 64;
          const int fade = std::min(bh, 6 + (int) ((float) bh * (float) fade_max / (float) h));

          float min_scale = 0.20f - 0.12f * strength;   // baseline bottom dim
          min_scale /= 8.0f;                            // much stronger fade
          if (min_scale < 0.015f) min_scale = 0.015f;

          for (int yy = 0; yy < bh; yy++) { // yy=0 bottom
            const int y = h - 1 - yy;

            float s = 1.0f;
            if (yy < fade) {
              const float u = (fade <= 1) ? 1.0f : ((float) yy / (float) (fade - 1)); // 0..1
              s = min_scale + (1.0f - min_scale) * u;
            }

            // Skip very dim pixels entirely (reduces "lights on" at the bottom)
            if (s < 0.09f) continue;

            // Purple shift near the TOP of the BAR (stronger when bar is tall)
            const float ubar = (bh <= 1) ? 1.0f : ((float) yy / (float) (bh - 1)); // 0 bottom -> 1 top
            float pmix = (ubar - 0.70f) / 0.30f;
            if (pmix < 0.0f) pmix = 0.0f;
            if (pmix > 1.0f) pmix = 1.0f;
            pmix = pmix * pmix;
            pmix *= strength;

            uint8_t r0 = (uint8_t) (((int) base.r) * s);
            uint8_t g0 = (uint8_t) (((int) base.g) * s);
            uint8_t b0 = (uint8_t) (((int) base.b) * s);

            const uint8_t pr = (uint8_t) (255.0f * s);
            const uint8_t pg = (uint8_t) (  0.0f * s);
            const uint8_t pb = (uint8_t) (255.0f * s);

            uint8_t r = lerp_u8(r0, pr, pmix);
            uint8_t g = lerp_u8(g0, pg, pmix);
            uint8_t b = lerp_u8(b0, pb, pmix);

            it.filled_rectangle(x, y, ww, 1, Color(r, g, b));
          }
        }

        if (pk > 0) {
          int py = h - pk - 1;
          if (py < 0) py = 0;
          it.filled_rectangle(x, py, ww, 1, Color(255, 255, 255));
        }
      }

      if (id(boot_anim)) {
        it.filled_rectangle(w - 2, 0, 2, 2, Color(255, 0, 0));
      } else {
        it.filled_rectangle(w - 2, 0, 2, 2, Color(0, 255, 0));
      }

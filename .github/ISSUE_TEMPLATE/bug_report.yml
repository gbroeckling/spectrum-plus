name: Bug Report
description: Report a problem with Spectrum Plus
labels: ["bug"]
body:
  - type: input
    id: idf_version
    attributes:
      label: ESP-IDF version
      placeholder: "e.g., v5.3.1"
    validations:
      required: true
  - type: input
    id: board
    attributes:
      label: Board / revision
      placeholder: "e.g., Waveshare ESP32-P4 Module Dev Kit v1.0"
    validations:
      required: false
  - type: input
    id: panel
    attributes:
      label: HUB75 panel model
      placeholder: "e.g., P3 128×64 FM6126A"
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Serial monitor logs
      description: Paste relevant log output here.
      render: text
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Photos / screenshots
      description: Attach photos of wiring or display behavior if relevant.
    validations:
      required: false

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Consolas, monospace" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#e67e22"/>
    </marker>
    <marker id="arr-r" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#c0392b"/>
    </marker>
    <marker id="arr-b" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#4a90d9"/>
    </marker>
    <!-- Gradient for the spectrum bar preview -->
    <linearGradient id="specGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="20%" stop-color="#f39c12"/>
      <stop offset="40%" stop-color="#f1c40f"/>
      <stop offset="55%" stop-color="#27ae60"/>
      <stop offset="75%" stop-color="#2980b9"/>
      <stop offset="100%" stop-color="#2c3e9b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" rx="8" fill="#1a1a2e"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#e0e0e0" font-size="17" font-weight="bold">Panel Daisy-Chain &amp; Power Wiring</text>
  <text x="450" y="48" text-anchor="middle" fill="#888" font-size="10">Two 128×64 HUB75 panels end-to-end = 256×64 total display (128 bars × 2 px each)</text>

  <!-- Panel 1 -->
  <rect x="40" y="80" width="350" height="170" rx="6" fill="#0d1f0d" stroke="#27ae60" stroke-width="2"/>
  <text x="215" y="103" text-anchor="middle" fill="#27ae60" font-size="15" font-weight="bold">Panel 1 (128×64)</text>

  <!-- Panel 1 spectrum preview -->
  <rect x="60" y="115" width="310" height="40" rx="3" fill="#111" stroke="#333" stroke-width="1"/>
  <rect x="62" y="135" width="15" height="18" fill="#e74c3c" opacity="0.9"/>
  <rect x="79" y="130" width="15" height="23" fill="#e74c3c" opacity="0.8"/>
  <rect x="96" y="125" width="15" height="28" fill="#e67e22" opacity="0.9"/>
  <rect x="113" y="120" width="15" height="33" fill="#f39c12" opacity="0.9"/>
  <rect x="130" y="122" width="15" height="31" fill="#f1c40f" opacity="0.9"/>
  <rect x="147" y="128" width="15" height="25" fill="#f1c40f" opacity="0.8"/>
  <rect x="164" y="118" width="15" height="35" fill="#2ecc71" opacity="0.9"/>
  <rect x="181" y="125" width="15" height="28" fill="#27ae60" opacity="0.9"/>
  <rect x="198" y="130" width="15" height="23" fill="#27ae60" opacity="0.8"/>
  <rect x="215" y="127" width="15" height="26" fill="#2980b9" opacity="0.9"/>
  <rect x="232" y="132" width="15" height="21" fill="#2980b9" opacity="0.8"/>
  <rect x="249" y="135" width="15" height="18" fill="#2471a3" opacity="0.8"/>
  <rect x="266" y="128" width="15" height="25" fill="#2471a3" opacity="0.7"/>
  <rect x="283" y="133" width="15" height="20" fill="#1a5276" opacity="0.7"/>
  <rect x="300" y="137" width="15" height="16" fill="#1a5276" opacity="0.6"/>
  <rect x="317" y="140" width="15" height="13" fill="#1a3c5e" opacity="0.5"/>
  <rect x="334" y="142" width="15" height="11" fill="#1a3c5e" opacity="0.4"/>
  <text x="215" y="152" text-anchor="middle" fill="#555" font-size="8">Bars 1–64 (30 Hz → ~2 kHz)</text>

  <!-- Panel 1 connectors -->
  <rect x="55" y="168" width="65" height="28" rx="4" fill="#27ae60"/>
  <text x="87" y="186" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">HUB75 IN</text>

  <rect x="310" y="168" width="70" height="28" rx="4" fill="#e67e22"/>
  <text x="345" y="186" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">HUB75 OUT</text>

  <text x="215" y="230" text-anchor="middle" fill="#4da86a" font-size="10">5V + GND from PSU</text>

  <!-- Panel 2 -->
  <rect x="480" y="80" width="350" height="170" rx="6" fill="#0d1f0d" stroke="#27ae60" stroke-width="2"/>
  <text x="655" y="103" text-anchor="middle" fill="#27ae60" font-size="15" font-weight="bold">Panel 2 (128×64)</text>

  <!-- Panel 2 spectrum preview -->
  <rect x="500" y="115" width="310" height="40" rx="3" fill="#111" stroke="#333" stroke-width="1"/>
  <rect x="502" y="133" width="15" height="20" fill="#2471a3" opacity="0.7"/>
  <rect x="519" y="128" width="15" height="25" fill="#2471a3" opacity="0.7"/>
  <rect x="536" y="125" width="15" height="28" fill="#2980b9" opacity="0.8"/>
  <rect x="553" y="130" width="15" height="23" fill="#2980b9" opacity="0.7"/>
  <rect x="570" y="133" width="15" height="20" fill="#1a5276" opacity="0.7"/>
  <rect x="587" y="128" width="15" height="25" fill="#1a5276" opacity="0.6"/>
  <rect x="604" y="135" width="15" height="18" fill="#154360" opacity="0.6"/>
  <rect x="621" y="130" width="15" height="23" fill="#154360" opacity="0.5"/>
  <rect x="638" y="137" width="15" height="16" fill="#1a3c5e" opacity="0.5"/>
  <rect x="655" y="140" width="15" height="13" fill="#1a3c5e" opacity="0.4"/>
  <rect x="672" y="138" width="15" height="15" fill="#1b2631" opacity="0.4"/>
  <rect x="689" y="142" width="15" height="11" fill="#1b2631" opacity="0.4"/>
  <rect x="706" y="144" width="15" height="9" fill="#1b2631" opacity="0.3"/>
  <rect x="723" y="145" width="15" height="8" fill="#17202a" opacity="0.3"/>
  <rect x="740" y="146" width="15" height="7" fill="#17202a" opacity="0.2"/>
  <rect x="757" y="147" width="15" height="6" fill="#17202a" opacity="0.2"/>
  <text x="655" y="152" text-anchor="middle" fill="#555" font-size="8">Bars 65–128 (~2 kHz → 18 kHz)</text>

  <!-- Panel 2 connectors -->
  <rect x="495" y="168" width="65" height="28" rx="4" fill="#27ae60"/>
  <text x="527" y="186" text-anchor="middle" fill="#fff" font-size="11" font-weight="bold">HUB75 IN</text>

  <rect x="750" y="168" width="70" height="28" rx="4" fill="#555"/>
  <text x="785" y="186" text-anchor="middle" fill="#aaa" font-size="11">HUB75 OUT</text>
  <text x="785" y="210" text-anchor="middle" fill="#666" font-size="9">(unused)</text>

  <text x="655" y="230" text-anchor="middle" fill="#4da86a" font-size="10">5V + GND from PSU</text>

  <!-- Daisy-chain ribbon cable -->
  <path d="M 380,182 C 420,182 440,182 480,182" stroke="#e67e22" stroke-width="3" fill="none" marker-end="url(#arr)"/>
  <rect x="400" y="165" width="80" height="20" rx="3" fill="#3a2a1a" stroke="#e67e22" stroke-width="1"/>
  <text x="440" y="179" text-anchor="middle" fill="#e67e22" font-size="10" font-weight="bold">16-pin ribbon</text>

  <!-- ESP32-P4 (small) -->
  <rect x="30" y="285" width="160" height="80" rx="6" fill="#16213e" stroke="#4a90d9" stroke-width="2"/>
  <text x="110" y="310" text-anchor="middle" fill="#4a90d9" font-size="12" font-weight="bold">ESP32-P4</text>
  <text x="110" y="326" text-anchor="middle" fill="#6a9fd9" font-size="9">Waveshare Dev Kit</text>
  <text x="110" y="342" text-anchor="middle" fill="#5a88b5" font-size="9">Onboard mic + codec</text>
  <text x="110" y="356" text-anchor="middle" fill="#5a88b5" font-size="9">USB-C for flashing</text>

  <!-- ESP32 → Panel 1 -->
  <path d="M 140,285 L 87,198" stroke="#4a90d9" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="90" y="250" fill="#4a90d9" font-size="10">14 wires</text>

  <!-- Power Supply -->
  <rect x="350" y="285" width="200" height="80" rx="6" fill="#2a1a1a" stroke="#c0392b" stroke-width="2"/>
  <text x="450" y="310" text-anchor="middle" fill="#c0392b" font-size="13" font-weight="bold">5V Power Supply</text>
  <text x="450" y="328" text-anchor="middle" fill="#e67e73" font-size="10">8A+ (4A per panel)</text>
  <text x="450" y="348" text-anchor="middle" fill="#a93226" font-size="9" font-weight="bold">Common GND to all devices!</text>

  <!-- Power → Panel 1 -->
  <path d="M 400,285 L 215,252" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-r)"/>
  <!-- Power → Panel 2 -->
  <path d="M 500,285 L 655,252" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-r)"/>
  <!-- Power → ESP32 GND -->
  <path d="M 350,330 L 192,330" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-r)"/>
  <text x="270" y="323" fill="#a93226" font-size="9">GND tie</text>

  <!-- Bottom note -->
  <text x="450" y="390" text-anchor="middle" fill="#666" font-size="10">The data signal flows: ESP32 → Panel 1 IN → Panel 1 OUT → Panel 2 IN (via ribbon cable)</text>
</svg>
